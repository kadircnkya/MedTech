worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Rate limiting zone
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # Upstream definitions
    upstream auth_service    { server auth-service:3001; }
    upstream user_service    { server user-service:3002; }
    upstream med_service     { server medication-service:3003; }
    upstream scan_service    { server scan-service:3004; }
    upstream ai_service      { server ai-service:3005; }
    upstream notif_service   { server notification-service:3006; }
    upstream track_service   { server tracking-service:3007; }
    upstream search_service  { server search-service:3008; }
    upstream patient_service { server patient-service:3009; }

    server {
        listen 80;
        server_name localhost;

        # Global settings
        client_max_body_size 10M;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;

        # Health check
        location /health {
            return 200 '{"status":"ok","gateway":"nginx"}';
            add_header Content-Type application/json;
        }

        # Auth Service
        location /api/v1/auth/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://auth_service/api/v1/auth/;
        }

        # User Service
        location /api/v1/users/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://user_service/api/v1/users/;
        }

        # Medication Service
        location /api/v1/medications/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://med_service/api/v1/medications/;
        }

        # Scan Service
        location /api/v1/scans/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://scan_service/api/v1/scans/;
        }

        # AI Service
        location /api/v1/ai/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_read_timeout 60s;
            proxy_pass http://ai_service/api/v1/ai/;
        }

        # Notification Service
        location /api/v1/notifications/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://notif_service/api/v1/notifications/;
        }

        # Tracking Service
        location /api/v1/tracking/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://track_service/api/v1/tracking/;
        }

        # Search Service
        location /api/v1/search/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://search_service/api/v1/search/;
        }

        # Patient Service
        location /api/v1/patients/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://patient_service/api/v1/patients/;
        }
    }
}
